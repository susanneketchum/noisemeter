<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Crowd Noise Meter</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>

body {

    margin: 0;
    overflow: hidden;
    position: relative;

    font-family: Arial, Helvetica, sans-serif;
    color: white;

    background-image: url('background3.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    background-color: rgba(0,0,0,0.35);
    background-blend-mode: normal;
}

.container {

    width: 100vw;
    height: 100vh;

    display: flex;
    flex-direction: column;

    justify-content: center;
    align-items: center;

    position: relative;

    z-index: 1;

    padding: 5vw;

    box-sizing: border-box;
}

.title {

    font-family: 'Anton', sans-serif;

    font-size: 10vw;

    letter-spacing: 0.06vw;

    line-height: 0.95;

    text-transform: uppercase;

    text-align: center;

    margin-bottom: 2vh;

    color: #c1a050;

    text-shadow:
        0 0 10px rgba(0,0,0,0.8),
        0 0 25px rgba(0,0,0,0.6);
}

.db {

    font-family: 'Anton', sans-serif;

    font-size: min(26vw, 220px);

    line-height: 1;

    text-shadow:
        0 0 15px rgba(0,0,0,0.8),
        0 0 30px rgba(0,0,0,0.5);
}

.label {

    font-size: min(5vw, 40px);

    margin-top: 1vh;

    letter-spacing: 0.2vw;

    text-shadow: 0 0 15px black;
}

.meter-container {

    width: 65vw;

    height: min(9vh, 80px);

    border: 3px solid white;

    border-radius: 12px;

    margin-top: 4vh;

    overflow: hidden;

    background: rgba(255,255,255,0.15);
}

.meter-fill {

    height: 100%;

    width: 10%;
    
    border-radius: 8px;

    background: lime;

   transition: 
       width 0.18s ease-out, 
       background 0.15s linear; 
    filter: blur(0.5px);
}

.hype {

    margin-top: 4vh;

    font-family: 'Anton', sans-serif;

    font-size: min(8vw, 60px);

    letter-spacing: 0.1vw;

    animation: pulse 1s infinite;

    text-shadow: 0 0 20px black;
}

@keyframes pulse {

    0% {
        transform: scale(1);
    }

    50% {
        transform: scale(1.08);
    }

    100% {
        transform: scale(1);
    }
}

</style>

</head>

<body>

<div class="container">

<div class="title" style="visibility:hidden;">
    PLACEHOLDER
</div>

    <div class="db" id="dbValue">
        85.0
    </div>

    <div class="label">
        ENERGY LEVEL
    </div>

    <div class="meter-container">
        <div class="meter-fill" id="meterFill"></div>
    </div>

    <div class="hype" id="hypeText">
        LET'S GO!
    </div>

</div>

<script>

navigator.mediaDevices.getUserMedia({ audio: true })

.then(function(stream) {

    const audioContext = new AudioContext();

    const microphone =
        audioContext.createMediaStreamSource(stream);

    const analyser =
        audioContext.createAnalyser();

    analyser.fftSize = 256;

    microphone.connect(analyser);

    const dataArray =
        new Uint8Array(analyser.frequencyBinCount);

    let lastUpdate = 0;
    let peakDb = 70; let peakHoldTimer = 0;

    function updateMeter() {

        analyser.getByteFrequencyData(dataArray);

        const now = Date.now();

        if(now - lastUpdate < 150) {
            requestAnimationFrame(updateMeter);
            return;
        }

        lastUpdate = now;

        let values = 0;

        for(let i = 0; i < dataArray.length; i++) {
            values += dataArray[i];
        }

        let average =
            values / dataArray.length;

        // Fake arena-style dB scaling
        let fakeDb =
            parseFloat(
                ((average * 0.6) + 70).toFixed(1)
            );

        // Clamp values
        if(fakeDb < 70) fakeDb = 70;
        if(fakeDb > 125) fakeDb = 125;
// Peak hold logic

if(fakeDb > peakDb) {

    peakDb = fakeDb;

    peakHoldTimer = Date.now();
}

// Tiny hold
if(Date.now() - peakHoldTimer > 180) {

    peakDb -= 2.8;
}

if(peakDb < fakeDb) {

    peakDb = fakeDb;
}

        

        // Update number
        document.getElementById("dbValue")
           .innerText = peakDb.toFixed(1);

        // Meter %
        let percent =
            ((peakDb - 70) / 55) * 100;

        const meter =
            document.getElementById("meterFill");

        meter.style.width = percent + "%";

        // Meter + number colors
        if(peakDb < 95) {

            meter.style.background = "lime";

            document.getElementById("dbValue")
                .style.color = "lime";
        }

        else if(peakDb < 100) {

            meter.style.background = "yellow";

            document.getElementById("dbValue")
                .style.color = "yellow";
        }

        else {

            meter.style.background = "red";

            document.getElementById("dbValue")
                .style.color = "red";
        }

        // Dynamic hype text
        let hypeText = "LET'S GO!";

        if(peakDb > 115) {
            hypeText = "LET EM **C**** KNOW!";
        }

        else if(peakDb > 105) {
            hypeText = "LOUDER!";
        }

        else if(peakDb > 95) {
            hypeText = "MAKE SOME NOISE!";
        }

        document.getElementById("hypeText")
            .innerText = hypeText;

        requestAnimationFrame(updateMeter);
    }

    updateMeter();
})

.catch(function(err) {

    alert("Microphone access denied.");

    console.log(err);
});

</script>

</body>

</html>
