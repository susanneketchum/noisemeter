<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Crowd Noise Meter</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>

body {

    margin: 0;
    overflow: hidden;
    position: relative;



    font-family: Arial, Helvetica, sans-serif;
    color: white;

    background-image: url('background3.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    background-color: rgba(0,0,0,0.35);
    background-blend-mode: normal;
}

.container {

    width: 100vw;
    height: 100vh;

    display: flex;
    flex-direction: column;

    justify-content: center;
    align-items: center;
}

.title {

    font-family: 'Anton', sans-serif;

    font-size: 10vw;

    letter-spacing: 0.06vw;

    line-height: 0.95;

    text-transform: uppercase;

    text-align: center;

    margin-bottom: 2vh;

    color: #c1a050;

    text-shadow:
        0 0 10px rgba(0,0,0,0.8),
        0 0 25px rgba(0,0,0,0.6);
}

.db {

    font-family: 'Anton', sans-serif;

    font-size: 14vw;

    line-height: 1;

    text-shadow:
        0 0 15px rgba(0,0,0,0.8),
        0 0 30px rgba(0,0,0,0.5);
}

.label {

    font-size: 2.5vw;

    margin-top: 1vh;

    letter-spacing: 0.2vw;

    text-shadow: 0 0 15px black;
}

.meter-container {

    width: 65vw;

    height: 8vh;

    border: 3px solid white;

    margin-top: 4vh;

    overflow: hidden;

    background: rgba(255,255,255,0.15);
}

.meter-fill {

    height: 100%;

    width: 10%;

    background: lime;

    transition:
        width 0.08s linear,
        background 0.15s linear;
}

.hype {

    margin-top: 4vh;

    font-family: 'Anton', sans-serif;

    font-size: 5vw;

    letter-spacing: 0.1vw;

    animation: pulse 1s infinite;

    text-shadow: 0 0 20px black;
}

@keyframes pulse {

    0% {
        transform: scale(1);
    }

    50% {
        transform: scale(1.08);
    }

    100% {
        transform: scale(1);
    }
}

#particleCanvas {

    position: fixed;

    top: 0;
    left: 0;

    width: 100vw;
    height: 100vh;

    z-index: 0;

    pointer-events: none;
}

.container {

    position: relative;

    z-index: 1;
}

</style>

</head>

<body>

<canvas id="particleCanvas"></canvas>


<div class="container">


<div class="title" style="visibility:hidden;">
    PLACEHOLDER
</div>


    <div class="db" id="dbValue">
        85.0
    </div>

    <div class="label">
        ENERGY LEVEL
    </div>

    <div class="meter-container">
        <div class="meter-fill" id="meterFill"></div>
    </div>

    <div class="hype" id="hypeText">
        LET'S GO!
    </div>

</div>

<script>

navigator.mediaDevices.getUserMedia({ audio: true })

.then(function(stream) {

    const audioContext = new AudioContext();

    const microphone =
        audioContext.createMediaStreamSource(stream);

    const analyser =
        audioContext.createAnalyser();

    analyser.fftSize = 256;

    microphone.connect(analyser);

    const dataArray =
        new Uint8Array(analyser.frequencyBinCount);

    function updateMeter() {

        analyser.getByteFrequencyData(dataArray);

        let values = 0;

        for(let i = 0; i < dataArray.length; i++) {
            values += dataArray[i];
        }

let average =
    values / dataArray.length;

window.currentAudioLevel = average;


        // Fake arena-style dB scaling
        let fakeDb =
            parseFloat(
                ((average * 0.6) + 70).toFixed(1)
            );

        // Clamp values
        if(fakeDb < 70) fakeDb = 70;
        if(fakeDb > 125) fakeDb = 125;

        // Update number
        document.getElementById("dbValue")
            .innerText = fakeDb;

        // Meter %
        let percent =
            ((fakeDb - 70) / 55) * 100;

        const meter =
            document.getElementById("meterFill");

        meter.style.width = percent + "%";

        // Meter + number colors
        if(fakeDb < 95) {

            meter.style.background = "lime";

            document.getElementById("dbValue")
                .style.color = "lime";
        }

        else if(fakeDb < 100) {

            meter.style.background = "yellow";

            document.getElementById("dbValue")
                .style.color = "yellow";
        }

        else {

            meter.style.background = "red";

            document.getElementById("dbValue")
                .style.color = "red";
        }

        // Dynamic hype text
        let hypeText = "LET'S GO!";

        if(fakeDb > 115) {
            hypeText = "LET EM **C**** KNOW!";
        }

        else if(fakeDb > 105) {
            hypeText = "LOUDER";
        }

        else if(fakeDb > 95) {
            hypeText = "MAKE SOME NOISE!";
        }

        document.getElementById("hypeText")
            .innerText = hypeText;

        requestAnimationFrame(updateMeter);
    }

    updateMeter();
})

.catch(function(err) {

    alert("Microphone access denied.");

    console.log(err);
});

// PARTICLE SYSTEM

const canvas =
    document.getElementById("particleCanvas");

const ctx =
    canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i = 0; i < 120; i++) {

    particles.push({

        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,

        size: Math.random() * 4 + 1,

        speedX: (Math.random() - 0.5) * 1,
        speedY: (Math.random() - 0.5) * 1,

        opacity: Math.random() * 0.5 + 0.2
    });
}

function drawParticles(audioLevel) {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {

        p.x += p.speedX * (audioLevel / 40);
        p.y += p.speedY * (audioLevel / 40);

        if(p.x < 0) p.x = canvas.width;
        if(p.x > canvas.width) p.x = 0;

        if(p.y < 0) p.y = canvas.height;
        if(p.y > canvas.height) p.y = 0;

        ctx.beginPath();

        ctx.arc(
            p.x,
            p.y,
            p.size + (audioLevel / 80),
            0,
            Math.PI * 2
        );

        ctx.fillStyle =
            "rgba(193,160,80," + p.opacity + ")";

        ctx.shadowBlur = 20 + (audioLevel / 8);

        ctx.shadowColor = "#c1a050";

        ctx.fill();
    });

    requestAnimationFrame(() =>
        drawParticles(window.currentAudioLevel || 0)
    );
}

drawParticles(0);


</script>

</body>

</html>
