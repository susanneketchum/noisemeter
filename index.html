<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Crowd Noise Meter</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>

body {

    margin: 0;
    overflow: hidden;
    position: relative;

    font-family: Arial, Helvetica, sans-serif;
    color: white;

    background-image: url('background3.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    background-color: rgba(0,0,0,0.35);
    background-blend-mode: normal;
}

.container {

    width: 100vw;
    height: 100vh;

    display: flex;
    flex-direction: column;

    justify-content: center;
    align-items: center;

    position: relative;

    z-index: 1;
}

.title {

    font-family: 'Anton', sans-serif;

    font-size: 10vw;

    letter-spacing: 0.06vw;

    line-height: 0.95;

    text-transform: uppercase;

    text-align: center;

    margin-bottom: 2vh;

    color: #c1a050;

    text-shadow:
        0 0 10px rgba(0,0,0,0.8),
        0 0 25px rgba(0,0,0,0.6);
}

.db {

    font-family: 'Anton', sans-serif;

    font-size: 14vw;

    line-height: 1;

    text-shadow:
        0 0 15px rgba(0,0,0,0.8),
        0 0 30px rgba(0,0,0,0.5);
}

.label {

    font-size: 2.5vw;

    margin-top: 1vh;

    letter-spacing: 0.2vw;

    text-shadow: 0 0 15px black;
}

.meter-container {

    width: 65vw;

    height: 8vh;

    border: 3px solid white;

    margin-top: 4vh;

    overflow: hidden;

    background: rgba(255,255,255,0.15);
}

.meter-fill {

    height: 100%;

    width: 10%;

    background: lime;

    transition:
        width 0.08s linear,
        background 0.15s linear;
}

.hype {

    margin-top: 4vh;

    font-family: 'Anton', sans-serif;

    font-size: 5vw;

    letter-spacing: 0.1vw;

    animation: pulse 1s infinite;

    text-shadow: 0 0 20px black;
}

@keyframes pulse {

    0% {
        transform: scale(1);
    }

    50% {
        transform: scale(1.08);
    }

    100% {
        transform: scale(1);
    }
}

</style>

</head>

<body>

<div class="container">

<div class="title" style="visibility:hidden;">
    PLACEHOLDER
</div>

    <div class="db" id="dbValue">
        85.0
    </div>

    <div class="label">
        ENERGY LEVEL
    </div>

    <div class="meter-container">
        <div class="meter-fill" id="meterFill"></div>
    </div>

    <div class="hype" id="hypeText">
        LET'S GO!
    </div>

</div>

<script>

navigator.mediaDevices.getUserMedia({ audio: true })

.then(function(stream) {

    const audioContext = new AudioContext();

    const microphone =
        audioContext.createMediaStreamSource(stream);

    const analyser =
        audioContext.createAnalyser();

    analyser.fftSize = 256;

    microphone.connect(analyser);

    const dataArray =
        new Uint8Array(analyser.frequencyBinCount);
        let displayedDb = 85;

    function updateMeter() {

        analyser.getByteFrequencyData(dataArray);

        let values = 0;

        for(let i = 0; i < dataArray.length; i++) {
            values += dataArray[i];
        }

        let average =
            values / dataArray.length;

        // Fake arena-style dB scaling
        let fakeDb =
            parseFloat(
                ((average * 0.6) + 70).toFixed(1)
            );

        // Clamp values
        if(fakeDb < 70) fakeDb = 70;
        if(fakeDb > 125) fakeDb = 125;
        // Smooth the displayed value 
        displayedDb += (fakeDb - displayedDb) * 0.05;

        // Update number
        document.getElementById("dbValue")
            .innerText = displayedDb.toFixed(1);

        // Meter %
        let percent =
            ((displayedDb - 70) / 55) * 100;

        const meter =
            document.getElementById("meterFill");

        meter.style.width = percent + "%";

        // Meter + number colors
        if(displayedDb < 95) {

            meter.style.background = "lime";

            document.getElementById("dbValue")
                .style.color = "lime";
        }

        else if(displayedDb < 100) {

            meter.style.background = "yellow";

            document.getElementById("dbValue")
                .style.color = "yellow";
        }

        else {

            meter.style.background = "red";

            document.getElementById("dbValue")
                .style.color = "red";
        }

        // Dynamic hype text
        let hypeText = "LET'S GO!";

        if(displayedDb > 115) {
            hypeText = "LET EM KNOW!";
        }

        else if(displayedDb > 105) {
            hypeText = "LOUDER!";
        }

        else if(displayedDb > 95) {
            hypeText = "MAKE SOME NOISE!";
        }

        document.getElementById("hypeText")
            .innerText = hypeText;

        requestAnimationFrame(updateMeter);
    }

    updateMeter();
})

.catch(function(err) {

    alert("Microphone access denied.");

    console.log(err);
});

</script>

</body>

</html>
