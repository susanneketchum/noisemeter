<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crowd Noise Meter</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    overflow: hidden;
    position: relative;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
}

/* VIDEO BACKGROUND */

#bgVideo {
    position: fixed;
    top: 0;
    left: 0;

    width: 100vw;
    height: 100vh;

    object-fit: cover;

    z-index: -2;
}

/* MAIN LAYOUT */

.container {

    width: 100vw;
    height: 100vh;

    display: flex;
    flex-direction: column;

    align-items: center;
    justify-content: flex-start;

    padding-top: 50vh;

    box-sizing: border-box;

    position: relative;

    z-index: 2;
}

/* NUMBER LOCKUP */

.db-wrapper {

    display: flex;

    align-items: baseline;

    gap: 1vw;
}

.db {

    font-family: 'Anton', sans-serif;

    font-size: min(22vw, 260px);

    line-height: 1;

    color: #ffffff;

    background: linear-gradient(
        to bottom,
        #ffffff 0%,
        #fdfdfd 25%,
        #d9d9d9 55%,
        #ffffff 100%
    );

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    -webkit-text-stroke: 4px #c1a050;

    filter:
        drop-shadow(0 4px 0 #7a5a21)
        drop-shadow(0 8px 0 #4a3412)
        drop-shadow(8px 10px 18px rgba(0,0,0,0.8));
}

.db-unit {

    font-family: 'Anton', sans-serif;

    font-size: min(9vw, 115px);

    background: linear-gradient(
        to bottom,
        #ffffff 0%,
        #ececec 50%,
        #ffffff 100%
    );

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    -webkit-text-stroke: 3px #c1a050;

    filter:
        drop-shadow(0 3px 0 #7a5a21)
        drop-shadow(0 5px 0 #4a3412)
        drop-shadow(4px 6px 12px rgba(0,0,0,0.8));
}

/* HYPE TEXT */

.hype {

    margin-top: 1.5vh;

    font-family: 'Anton', sans-serif;

    font-size: min(4vw, 46px);

    letter-spacing: 0.06em;

    color: #ffffff;

    padding: 0.25em 0.75em;

    background: rgba(0,0,0,0.42);

    border: 2px solid #c1a050;

    border-radius: 10px;

    box-shadow:
        0 0 18px rgba(193,160,80,0.35),
        6px 8px 14px rgba(0,0,0,0.45);

    text-shadow:
        3px 3px 8px rgba(0,0,0,0.85);

    animation: pulse 1s infinite;
}

@keyframes pulse {

    0% {
        transform: scale(1);
    }

    50% {
        transform: scale(1.06);
    }

    100% {
        transform: scale(1);
    }
}

</style>

</head>

<body>

<video autoplay muted loop playsinline id="bgVideo">
    <source src="motion.mp4" type="video/mp4">
</video>

<div class="container">

    <div class="db-wrapper">

        <div class="db" id="dbValue">
            85.0
        </div>

        <div class="db-unit">
            dB
        </div>

    </div>

    <div class="hype" id="hypeText">
        LET'S GO!
    </div>

</div>

<script>

navigator.mediaDevices.getUserMedia({ audio: true })

.then(function(stream) {

    const audioContext =
        new AudioContext();

    const microphone =
        audioContext.createMediaStreamSource(stream);

    const analyser =
        audioContext.createAnalyser();

    analyser.fftSize = 256;

    microphone.connect(analyser);

    const dataArray =
        new Uint8Array(analyser.frequencyBinCount);

    let lastUpdate = 0;

    let peakDb = 70;

    let peakHoldTimer = 0;

    function updateMeter() {

        analyser.getByteFrequencyData(dataArray);

        const now = Date.now();

        if(now - lastUpdate < 150) {

            requestAnimationFrame(updateMeter);

            return;
        }

        lastUpdate = now;

        let values = 0;

        for(let i = 0; i < dataArray.length; i++) {

            values += dataArray[i];
        }

        let average =
            values / dataArray.length;

        /* FAKE DB SCALE */

        let fakeDb =
            parseFloat(
                ((average * 0.6) + 70).toFixed(1)
            );

        /* CLAMP */

        if(fakeDb < 70) fakeDb = 70;

        if(fakeDb > 125) fakeDb = 125;

        /* PEAK HOLD */

        if(fakeDb > peakDb) {

            peakDb = fakeDb;

            peakHoldTimer = Date.now();
        }

        /* QUICK DECAY */

        if(Date.now() - peakHoldTimer > 180) {

            peakDb -= 2.8;
        }

        if(peakDb < fakeDb) {

            peakDb = fakeDb;
        }

        /* UPDATE NUMBER */

        document.getElementById("dbValue")
            .innerText = peakDb.toFixed(1);

        /* HYPE TEXT */

        let hypeText = "LET'S GO!";

        if(peakDb > 115) {

            hypeText = "LET EM **C**** KNOW!";
        }

        else if(peakDb > 105) {

            hypeText = "LOUDER!";
        }

        else if(peakDb > 95) {

            hypeText = "MAKE SOME NOISE!";
        }

        document.getElementById("hypeText")
            .innerText = hypeText;

        requestAnimationFrame(updateMeter);
    }

    updateMeter();
})

.catch(function(err) {

    alert("Microphone access denied.");

    console.log(err);
});

</script>

</body>

</html>
